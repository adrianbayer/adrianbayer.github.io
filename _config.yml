# Site Settings
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "air"

locale: "en-US"
title: "Adrian E. Bayer"
subtitle: "Astrophysicist @ Princeton University and Simons Foundation"
name: "Adrian E. Bayer"
description: "My website."
url: "https://adrianbayer.github.io"
baseurl: ""

# Author
author:
  name: "Adrian E. Bayer"
  avatar: "/assets/img/headshot.jpg"
  bio: "Astrophysicist @ Princeton University and Simons Foundation"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:abayer@princeton.edu"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/adrianbayer"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/adrian-bayer"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0002-3568-3900"
    - label: "Work"
      icon: "fas fa-fw fa-building"
      url: "https://physics.berkeley.edu/people/graduate-student/adrian-bayer"

# Markdown
markdown: kramdown
kramdown:
  input: GFM

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "single"
      author_profile: false

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-remote-theme

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - bin
  - Dockerfile
  - CONTRIBUTING.md
  - README.md
  - LICENSE

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-TBZMZEXYRY"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/adrianbayer"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/adrian-bayer"

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Explorer &mdash; Multi-Probe Sky</title>
<script>
(function(){
  var k='sonify_auth';
  if(sessionStorage.getItem(k)==='1') return;
  var p=prompt('Enter password:');
  if(p==='4halfdomes'){sessionStorage.setItem(k,'1');}
  else{document.documentElement.innerHTML='<body style="background:#0a0e1a;color:#c8cde0;display:flex;justify-content:center;align-items:center;height:100vh;font-family:system-ui"><h2>Access denied</h2></body>';throw'blocked';}
})();
</script>
<style>
:root{
  --bg:#0a0e1a; --panel:#131829; --border:#1e2744; --text:#c8cde0; --accent:#4a9eff;
  --cmb:#4a9eff; --tsz:#ff9f43; --cib:#2ed573; --ksz:#b86bff; --tot:#ebebeb;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;}
header{display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--border);}
header h1{font-size:1.05em;font-weight:600;color:#e8ecf4;}
header .sub{font-size:0.78em;color:#6b7394;}
a.back{color:var(--accent);text-decoration:none;font-size:0.82em;border:1px solid var(--border);padding:4px 10px;border-radius:6px;}
a.back:hover{background:#1e2744;}
.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);}
.cgroup{display:flex;align-items:center;gap:6px;}
.clabel{font-size:0.68em;text-transform:uppercase;letter-spacing:0.6px;color:#6b7394;}
.btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;font-size:0.8em;}
.btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.btn:hover{filter:brightness(1.15);}
.comp-btn{border-width:2px;}
.comp-btn[data-comp="dT_cmblens"]{border-color:var(--cmb);} .comp-btn[data-comp="dT_cmblens"].active{background:var(--cmb);color:#06101f;}
.comp-btn[data-comp="dT_tsz"]{border-color:var(--tsz);} .comp-btn[data-comp="dT_tsz"].active{background:var(--tsz);color:#06101f;}
.comp-btn[data-comp="dT_cib"]{border-color:var(--cib);} .comp-btn[data-comp="dT_cib"].active{background:var(--cib);color:#06101f;}
.comp-btn[data-comp="dT_ksz"]{border-color:var(--ksz);} .comp-btn[data-comp="dT_ksz"].active{background:var(--ksz);color:#06101f;}
.comp-btn[data-comp="T_tot"]{border-color:var(--tot);} .comp-btn[data-comp="T_tot"].active{background:var(--tot);color:#06101f;}
.freq-group{display:flex;align-items:center;gap:3px;padding:2px 6px;border:1px solid var(--border);border-radius:6px;}
.freq-group .clabel{margin-right:2px;}
#wrap{position:relative;width:100vw;height:calc(100vh - 96px);}
#map{display:block;width:100%;height:100%;cursor:grab;touch-action:none;background:#04060c;}
#map.grabbing{cursor:grabbing;}
#map.scan{cursor:cell;}
.readout{position:absolute;left:10px;bottom:10px;font-size:0.75em;color:#9aa3c4;background:rgba(4,6,12,0.72);
  padding:4px 8px;border-radius:6px;pointer-events:none;}
.readout b{color:var(--accent);}
.hint{position:absolute;right:10px;bottom:10px;font-size:0.72em;color:#6b7394;background:rgba(4,6,12,0.72);
  padding:4px 8px;border-radius:6px;pointer-events:none;max-width:46%;text-align:right;}
input[type=range]{accent-color:var(--accent);}
</style>
</head>
<body>

<header>
  <h1>Sky Explorer</h1>
  <span class="sub">drag to pan &middot; wheel/buttons to zoom &middot; longitude wraps &middot; components overlay</span>
  <a class="back" href="index.html">&larr; All toys</a>
  <a class="back" href="sonifier.html">Sonifier</a>
  <a class="back" href="about.html">How it works</a>
</header>

<div class="controls">
  <div class="cgroup">
    <span class="clabel" title="Toggle components: the map overlays them and the scanner sonifies them">Components</span>
    <button class="btn comp-btn active" data-comp="dT_cmblens">CMB</button>
    <button class="btn comp-btn" data-comp="dT_tsz">tSZ</button>
    <button class="btn comp-btn" data-comp="dT_cib">CIB</button>
    <button class="btn comp-btn" data-comp="dT_ksz">kSZ</button>
    <button class="btn comp-btn" data-comp="T_tot">Total</button>
  </div>
  <div class="cgroup">
    <span class="clabel">Frequency</span>
    <div class="freq-group"><span class="clabel">SO MF</span>
      <button class="btn freq-btn" data-freq="93">93</button>
      <button class="btn freq-btn" data-freq="145">145</button></div>
    <div class="freq-group"><span class="clabel">SO HF</span>
      <button class="btn freq-btn" data-freq="225">225</button>
      <button class="btn freq-btn" data-freq="280">280</button></div>
    <div class="freq-group"><span class="clabel">Planck</span>
      <button class="btn freq-btn active" data-freq="143">143</button>
      <button class="btn freq-btn" data-freq="353">353</button></div>
  </div>
  <div class="cgroup">
    <span class="clabel">Zoom</span>
    <button class="btn" id="zoomOut">&minus;</button>
    <button class="btn" id="zoomIn">+</button>
    <button class="btn" id="zoomReset">reset</button>
  </div>
  <div class="cgroup">
    <button class="btn" id="scanBtn" title="Sonify the sky under the cursor while dragging">Scan audio</button>
    <span class="clabel">Vol</span>
    <input type="range" id="vol" min="0" max="100" value="70" style="width:80px;">
  </div>
</div>

<div id="wrap">
  <canvas id="map"></canvas>
  <div class="readout" id="readout">&mdash;</div>
  <div class="hint" id="hint"></div>
</div>

<script>
const V = {
  meta:null, halos:null, cl:null,
  metaW:4096, metaH:2048,
  scale:1, minScale:1, maxScale:2, panX:0, panY:0,
  comps:new Set(['dT_cmblens']), freq:'143',
  layers:{}, valMaps:{},
  dragging:false, moved:false, lastX:0, lastY:0,
  scan:false, volume:0.7, scanLast:0,
  audioCtx:null, gain:null, limiter:null,
};
const ORDER=['dT_cmblens','dT_ksz','dT_tsz','dT_cib','T_tot'];
const COMP_LABELS={dT_cmblens:'CMB', dT_tsz:'tSZ', dT_cib:'CIB', dT_ksz:'kSZ', T_tot:'Total'};

const canvas=document.getElementById('map');
const ctx=canvas.getContext('2d');

function layerKey(comp){ return comp==='T_tot' ? ('T_tot_f'+V.freq) : comp; }

// ============= geometry / view =============
function recomputeScaleLimits(){
  V.minScale = V.ch/V.metaH;
  V.maxScale = Math.max(V.minScale, 2);   // 1 = hi-res native width; allow 2x
  if(V.scale<V.minScale) V.scale=V.minScale;
  if(V.scale>V.maxScale) V.scale=V.maxScale;
}
function resize(){
  const r=document.getElementById('wrap').getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  canvas.width=Math.round(r.width*dpr); canvas.height=Math.round(r.height*dpr);
  canvas.style.width=r.width+'px'; canvas.style.height=r.height+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  V.cw=r.width; V.ch=r.height;
  recomputeScaleLimits(); clampView(); draw();
}
function clampView(){
  if(V.scale<V.minScale) V.scale=V.minScale;
  if(V.scale>V.maxScale) V.scale=V.maxScale;
  const sH=V.metaH*V.scale;
  if(sH<=V.ch) V.panY=(V.ch-sH)/2;
  else V.panY=Math.min(0, Math.max(V.ch-sH, V.panY));
}
function screenToSky(sx,sy){
  let fx=(sx-V.panX)/(V.metaW*V.scale); fx-=Math.floor(fx);     // longitude wraps
  const fy=(sy-V.panY)/(V.metaH*V.scale);
  if(fy<0||fy>1) return null;
  return {fx, fy, phi:fx*360, theta:fy*180};
}

// ============= image layers (one per component, additive composite) =============
function layerImg(key){ const L=V.layers[key]; return L ? (L.hi||L.lo) : null; }
function ensureLayers(){
  let anyLoading=false;
  for(const c of V.comps){
    const key=layerKey(c);
    let L=V.layers[key]; if(!L){ L=V.layers[key]={lo:null,hi:null,loLoading:false,hiLoading:false}; }
    if(!L.lo && !L.loLoading){
      L.loLoading=true; anyLoading=true;
      const im=new Image();
      im.onload=()=>{ L.lo=im; draw(); loadHiLayer(key); updateHint(); };
      im.onerror=()=>{ L.loLoading=false; };
      im.src='sky_img/'+key+'_lo.jpg';
    } else if(!L.hi && !L.hiLoading){ loadHiLayer(key); }
  }
  updateHint();
}
function loadHiLayer(key){
  const L=V.layers[key]; if(!L||L.hi||L.hiLoading) return;
  L.hiLoading=true;
  const im=new Image();
  im.onload=()=>{ L.hi=im; draw(); };
  im.onerror=()=>{ L.hiLoading=false; };
  im.src='sky_img/'+key+'.jpg';
}
function updateHint(){
  for(const c of V.comps){ if(!layerImg(layerKey(c))){ document.getElementById('hint').textContent='loading…'; return; } }
  document.getElementById('hint').textContent='';
}

// ============= draw =============
function draw(){
  if(!V.cw) return;
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='#04060c'; ctx.fillRect(0,0,V.cw,V.ch);
  const sW=V.metaW*V.scale, sH=V.metaH*V.scale;
  let baseX=V.panX % sW; if(baseX>0) baseX-=sW;
  ctx.imageSmoothingEnabled=true;
  ctx.globalCompositeOperation='lighter';      // additive: components glow & combine
  for(const c of ORDER){
    if(!V.comps.has(c)) continue;
    const img=layerImg(layerKey(c)); if(!img) continue;
    for(let x=baseX; x<V.cw; x+=sW) ctx.drawImage(img, x, V.panY, sW, sH);
  }
  ctx.globalCompositeOperation='source-over';
  drawHalos(baseX, sW, sH);
}
function drawHalos(baseX, sW, sH){
  if(!V.halos) return;
  for(let i=0;i<V.halos.n;i++){
    const iy=(V.halos.theta[i]/180)*V.metaH, y=V.panY+iy*V.scale;
    if(y<-4||y>V.ch+4) continue;
    const ix=(V.halos.phi[i]/360)*V.metaW, logM=V.halos.log_mass[i];
    const sz=Math.max(1.2,(logM-14.5)*3.2);
    for(let x=baseX+ix*V.scale; x<V.cw+sz; x+=sW){
      if(x<-sz) continue;
      ctx.globalAlpha=Math.min(0.8,(logM-14.5)*0.7+0.2);
      ctx.fillStyle='#ffd58a';
      ctx.beginPath(); ctx.arc(x,y,sz,0,2*Math.PI); ctx.fill();
      if(logM>15.0){ ctx.globalAlpha=0.9; ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(x,y,sz+1,0,2*Math.PI); ctx.stroke(); }
    }
  }
  ctx.globalAlpha=1;
}

// ============= value maps (faithful per-component values for audio) =============
function valInfo(comp){
  if(!V.meta) return null;
  const im=V.meta.images;
  return comp==='T_tot' ? (im.T_tot&&im.T_tot[V.freq]) : im[comp];
}
function loadValMap(comp){
  const key=layerKey(comp);
  if(V.valMaps[key]) return;
  const info=valInfo(comp); if(!info||!info.val) return;
  V.valMaps[key]='loading';
  const im=new Image();
  im.onload=()=>{
    const c=document.createElement('canvas'); c.width=im.naturalWidth; c.height=im.naturalHeight;
    const cx=c.getContext('2d',{willReadFrequently:true}); cx.drawImage(im,0,0);
    V.valMaps[key]={cx, w:c.width, h:c.height, mode:info.mode};
  };
  im.onerror=()=>{ delete V.valMaps[key]; };
  im.src='sky_img/'+info.val;
}
function loadValMaps(){ for(const c of V.comps) loadValMap(c); }
function sampleValue(comp, fx, fy){          // signed [-1,1], cold/low..hot/high, or null
  const vm=V.valMaps[layerKey(comp)];
  if(!vm || vm==='loading') return null;
  const x=Math.min(vm.w-1,Math.max(0,Math.floor(fx*vm.w)));
  const y=Math.min(vm.h-1,Math.max(0,Math.floor(fy*vm.h)));
  let g; try{ g=vm.cx.getImageData(x,y,1,1).data[0]; }catch(e){ return null; }
  return vm.mode==='sym' ? (g-128)/127 : (g/255)*2-1;
}

// ============= audio =============
function initAudio(){
  if(V.audioCtx) return;
  V.audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  V.gain=V.audioCtx.createGain(); V.gain.gain.value=V.volume;
  V.limiter=V.audioCtx.createDynamicsCompressor();
  V.limiter.threshold.value=-3; V.limiter.ratio.value=12; V.limiter.attack.value=0.003; V.limiter.release.value=0.25;
  V.gain.connect(V.limiter); V.limiter.connect(V.audioCtx.destination);
}
const VOICES={
  dT_cmblens:{base:196, type:'sine',     vol:0.20},
  dT_ksz:    {base:147, type:'square',   vol:0.13},
  dT_tsz:    {base:294, type:'triangle', vol:0.20},
  dT_cib:    {base:494, type:'sawtooth', vol:0.15},
  T_tot:     {base:262, type:'sine',     vol:0.18},
};
function compMeanDl(comp, band){
  const sp=V.cl.spectra[comp]; if(!sp) return 0;
  const arr=(V.cl.freq_indep && V.cl.freq_indep.indexOf(comp)>=0) ? sp : sp[band];
  if(!arr) return 0;
  let s=0,n=0; for(let i=0;i<arr.length;i++){ if(arr[i]>0){ s+=arr[i]; n++; } }
  return n ? s/n : 0;
}
function bandFactor(comp){     // loudness vs this component's strongest band (freq-indep -> 1)
  if(!V.cl || (V.cl.freq_indep && V.cl.freq_indep.indexOf(comp)>=0)) return 1;
  let mx=0; for(const b of V.cl.freqs){ const a=compMeanDl(comp,String(b)); if(a>mx) mx=a; }
  if(mx<=0) return 1;
  return Math.sqrt(compMeanDl(comp,V.freq)/mx);
}
function playVoice(comp, norm){
  const cfg=VOICES[comp]||VOICES.T_tot;
  const vol=cfg.vol*bandFactor(comp);
  if(vol<0.004) return;                       // band-suppressed (e.g. tSZ at the 225 null)
  initAudio(); if(V.audioCtx.state==='suspended') V.audioCtx.resume();
  const ctx2=V.audioCtx, now=ctx2.currentTime;
  const freq=cfg.base*Math.pow(2, Math.max(-1,Math.min(1,norm)));
  const o=ctx2.createOscillator(), g=ctx2.createGain();
  o.type=cfg.type; o.frequency.value=freq;
  g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(vol,now+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.22);
  o.connect(g); g.connect(V.gain); o.start(now); o.stop(now+0.26);
}
function haloPing(logM){
  initAudio(); if(V.audioCtx.state==='suspended') V.audioCtx.resume();
  const ctx2=V.audioCtx, now=ctx2.currentTime;
  const frac=Math.min(1,Math.max(0,(logM-14.5)/0.9)), freq=200+frac*1100;
  const o=ctx2.createOscillator(), o2=ctx2.createOscillator(), g=ctx2.createGain(), g2=ctx2.createGain();
  o.type='sine'; o.frequency.value=freq; o2.type='sine'; o2.frequency.value=freq*2; g2.gain.value=0.3;
  g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.3,now+0.008);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
  o.connect(g); o2.connect(g2); g2.connect(g); g.connect(V.gain);
  o.start(now); o.stop(now+0.55); o2.start(now); o2.stop(now+0.4);
}
function sonifyAt(sx,sy){
  const sk=screenToSky(sx,sy); if(!sk) return;
  for(const c of ORDER){
    if(!V.comps.has(c)) continue;
    const norm=sampleValue(c, sk.fx, sk.fy);
    if(norm===null){ loadValMap(c); continue; }
    playVoice(c, norm);
  }
  if(V.halos){
    const sinT=Math.sin(sk.theta*Math.PI/180);
    for(let i=0;i<V.halos.n;i++){
      let dp=Math.abs(V.halos.phi[i]-sk.phi); if(dp>180) dp=360-dp;
      const dt=V.halos.theta[i]-sk.theta;
      if(Math.sqrt(dt*dt+dp*dp*sinT*sinT)<3.0) haloPing(V.halos.log_mass[i]);
    }
  }
  const heard=ORDER.filter(c=>V.comps.has(c)).map(c=>COMP_LABELS[c]).join('+')||'—';
  document.getElementById('readout').innerHTML=
    'l/b &asymp; <b>'+sk.phi.toFixed(0)+'&deg;, '+(90-sk.theta).toFixed(0)+'&deg;</b> &nbsp;|&nbsp; hearing: '+heard;
}

// ============= interaction =============
function zoomAt(sx,sy,factor){
  const ns=Math.min(V.maxScale,Math.max(V.minScale,V.scale*factor));
  const f=ns/V.scale; V.panX=sx-(sx-V.panX)*f; V.panY=sy-(sy-V.panY)*f;
  V.scale=ns; clampView(); draw();
}
canvas.addEventListener('mousedown',e=>{ V.dragging=true; V.moved=false; V.lastX=e.clientX; V.lastY=e.clientY; canvas.classList.add('grabbing'); });
window.addEventListener('mousemove',e=>{
  if(!V.dragging) return;
  const dx=e.clientX-V.lastX, dy=e.clientY-V.lastY; V.lastX=e.clientX; V.lastY=e.clientY;
  if(Math.abs(dx)+Math.abs(dy)>2) V.moved=true;
  if(V.scan){ const r=canvas.getBoundingClientRect(); if(Date.now()-V.scanLast>150){ sonifyAt(e.clientX-r.left,e.clientY-r.top); V.scanLast=Date.now(); } }
  else { V.panX+=dx; V.panY+=dy; clampView(); draw(); }
});
window.addEventListener('mouseup',()=>{ V.dragging=false; canvas.classList.remove('grabbing'); });
canvas.addEventListener('click',e=>{ if(V.moved) return; const r=canvas.getBoundingClientRect(); sonifyAt(e.clientX-r.left,e.clientY-r.top); });
canvas.addEventListener('wheel',e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect(); zoomAt(e.clientX-r.left,e.clientY-r.top, e.deltaY<0?1.15:1/1.15); },{passive:false});

let pinchD=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){ V.dragging=true; V.moved=false; V.lastX=e.touches[0].clientX; V.lastY=e.touches[0].clientY; }
  else if(e.touches.length===2){ V.dragging=false; pinchD=touchDist(e); }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  const r=canvas.getBoundingClientRect();
  if(e.touches.length===1 && V.dragging){
    const t=e.touches[0], dx=t.clientX-V.lastX, dy=t.clientY-V.lastY; V.lastX=t.clientX; V.lastY=t.clientY;
    if(Math.abs(dx)+Math.abs(dy)>2) V.moved=true;
    if(V.scan){ if(Date.now()-V.scanLast>150){ sonifyAt(t.clientX-r.left,t.clientY-r.top); V.scanLast=Date.now(); } }
    else { V.panX+=dx; V.panY+=dy; clampView(); draw(); }
  } else if(e.touches.length===2){
    const d=touchDist(e); if(pinchD>0){ const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left, cy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top; zoomAt(cx,cy,d/pinchD); } pinchD=d;
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(e.touches.length===0 && V.dragging && !V.moved){ const t=e.changedTouches[0]; const r=canvas.getBoundingClientRect(); sonifyAt(t.clientX-r.left,t.clientY-r.top); }
  V.dragging=false; pinchD=0; e.preventDefault();
},{passive:false});
function touchDist(e){ const a=e.touches[0],b=e.touches[1]; return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY); }

// controls
document.querySelectorAll('.comp-btn').forEach(b=>b.addEventListener('click',()=>{
  const c=b.dataset.comp;
  if(V.comps.has(c)){ if(V.comps.size>1) V.comps.delete(c); }   // keep at least one on
  else { V.comps.add(c); loadValMap(c); }
  b.classList.toggle('active', V.comps.has(c));
  ensureLayers(); draw();
}));
document.querySelectorAll('.freq-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.freq-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active');
  V.freq=b.dataset.freq;
  if(V.comps.has('T_tot')){ ensureLayers(); loadValMap('T_tot'); }   // Total is per-band
  draw();
}));
document.getElementById('zoomIn').addEventListener('click',()=>zoomAt(V.cw/2,V.ch/2,1.4));
document.getElementById('zoomOut').addEventListener('click',()=>zoomAt(V.cw/2,V.ch/2,1/1.4));
document.getElementById('zoomReset').addEventListener('click',()=>{ V.scale=V.minScale; V.panX=0; clampView(); draw(); });
document.getElementById('scanBtn').addEventListener('click',()=>{
  V.scan=!V.scan; document.getElementById('scanBtn').classList.toggle('active',V.scan);
  canvas.classList.toggle('scan',V.scan);
  if(V.scan){ initAudio(); loadValMaps(); }
});
document.getElementById('vol').addEventListener('input',e=>{ V.volume=e.target.value/100; if(V.gain) V.gain.gain.value=V.volume; });
window.addEventListener('resize',resize);

// init
async function init(){
  document.getElementById('hint').textContent='loading…';
  try{
    const [a,b,e]=await Promise.all([fetch('sky_img/sky_img.json'),fetch('halos.json'),fetch('cl_data.json')]);
    if(!a.ok) throw new Error('sky_img.json HTTP '+a.status);
    V.meta=await a.json(); V.metaW=V.meta.width; V.metaH=V.meta.height;
    V.halos = b.ok ? await b.json() : null;
    V.cl = e.ok ? await e.json() : null;
    resize();
    ensureLayers();
    loadValMaps();
  }catch(err){
    document.getElementById('hint').textContent='Load failed: '+err.message+(location.protocol==='file:'?' (serve over http, not file://)':'');
  }
}
init();
</script>
